name: HiddenTest
version: 1.0
main: com.hiddentest.HiddenTest
api-version: 1.21

author: Deejay
description: Identity anonymization and reveal testing plugin.

commands:
  reveal:
    description: Reveal a player
    usage: /reveal <player>
    permission: hiddentest.reveal

  hide:
    description: Hide a player again
    usage: /hide <player>
    permission: hiddentest.hide

  givecompass:
    description: Gives a Detective's Compass
    usage: /givecompass <player>
    permission: hiddentest.givecompass

  givebell:
    description: Gives the Bell of Truth
    usage: /givebell <player>
    permission: hiddentest.givebell

  summonchicken:
    description: Summons the Unknown Chicken boss
    usage: /summonchicken
    permission: hiddentest.summonchicken

  givebook:
    description: Gives the Book of Names
    usage: /givebook
    permission: hiddentest.givebook

  # ✅ NEW COMMAND
  serverstart:
    description: Starts the event sequence
    usage: /serverstart
    permission: hiddentest.serverstart

permissions:
  hiddentest.reveal:
    description: Allows revealing players
    default: op

  hiddentest.hide:
    description: Allows hiding players
    default: op

  hiddentest.givecompass:
    description: Allows giving the Detective's Compass
    default: op

  hiddentest.givebell:
    description: Allows giving the Bell of Truth
    default: op

  hiddentest.summonchicken:
    description: Allows summoning the Unknown Chicken
    default: op

  hiddentest.givebook:
    description: Allows giving the Book of Names
    default: true

  # ✅ NEW PERMISSION
  hiddentest.serverstart:
    description: Allows starting the server event
    default: op
